<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>موقع زهراء</title>
    <style>
        body { 
            background-color: #000000; /* هنا غيرنا اللون لأسود ملكي خالص */
            color: white; 
            text-align: center; 
            padding-top: 40px; 
            font-family: sans-serif; 
        }
        h1 { color: #ff4757; font-size: 36px; margin-bottom: 5px; text-shadow: 0 0 10px rgba(255,71,87,0.4); }
        p { color: #ced6e0; font-size: 18px; margin-bottom: 25px; }
        
        .video-box {
            max-width: 90%;
            width: 380px;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(255, 71, 87, 0.4);
            border: 2px solid #ff4757;
            background: #000;
        }
        video {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <h1>Hello, World!</h1>
    <p>مرحباً بكم في موقع زهراء الرسمي الدائم 🚀</p>

    <div class="video-box">
        <video autoplay loop controls playsinline>
            <source src="https://zmxzahr.github.io/zahraa-site/clip.mp4" type="video/mp4">
            متصفحك لا يدعم تشغيل الفيديو.
        </video>
    </div>

</body>
</html>
